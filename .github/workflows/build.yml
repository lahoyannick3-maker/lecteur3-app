name: Build Application Native Android Complete

on:
  push:
    branches: [ main, master ] # Se déclenche à chaque push

jobs:
  android-build:
    runs-on: ubuntu-latest

    steps:
    - name: Récupération du code source
      uses: actions/checkout@v4

    - name: Configuration de Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20

    - name: Configuration de Java JDK 17 (Requis pour compiler Android)
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Installation des dépendances
      run: npm install

    - name: Initialisation ou vérification de la plateforme Android
      run: |
        if [ ! -d "android" ]; then
          echo "Le dossier Android n'existe pas. Création de la plateforme..."
          npx cap add android
        else
          echo "Le dossier Android existe déjà. Passage à la synchronisation."
        fi

    - name: Injection forcée des permissions de scan global et notifications
      run: |
        MANIFEST="android/app/src/main/AndroidManifest.xml"
        # Ajout des autorisations absolues pour scanner les dossiers, sous-dossiers et notifier l'utilisateur
        sed -i '/<\/manifest>/i \    <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE" \/>' $MANIFEST
        sed -i '/<\/manifest>/i \    <uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE" \/>' $MANIFEST
        sed -i '/<\/manifest>/i \    <uses-permission android:name="android.permission.MANAGE_EXTERNAL_STORAGE" \/>' $MANIFEST
        sed -i '/<\/manifest>/i \    <uses-permission android:name="android.permission.POST_NOTIFICATIONS" \/>' $MANIFEST

    - name: Synchronisation finale des scripts (libs) et du code web
      run: npx cap sync android

    - name: Autorisation d'exécution Gradle
      run: chmod +x android/gradlew

    - name: Compilation de l'APK Natif
      run: |
        cd android
        ./gradlew assembleDebug

    - name: Téléchargement de ton fichier APK
      uses: actions/upload-artifact@v4
      with:
        name: MonApp-Native-Complete
        path: android/app/build/outputs/apk/debug/app-debug.apk
