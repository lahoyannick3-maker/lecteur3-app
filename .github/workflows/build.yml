name: Build Application Native Android Complete

on:
  push:
    branches: [ main, master ] # Se déclenche à chaque push

jobs:
  android-build:
    runs-on: ubuntu-latest

    steps:
    - name: Récupération du code source
      uses: actions/checkout@v4

    - name: Configuration de Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20

    - name: Configuration de Java JDK 17 (Requis pour compiler Android)
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Installation des dépendances
      run: npm install

    - name: Initialisation ou vérification de la plateforme Android
      run: |
        if [ ! -d "android" ]; then
          echo "Le dossier Android n'existe pas. Création de la plateforme..."
          npx cap add android
        else
          echo "Le dossier Android existe déjà. Passage à la synchronisation."
        fi

    - name: Injection forcée des permissions de scan global et notifications
      run: |
        MANIFEST="android/app/src/main/AndroidManifest.xml"
        # Ajout des autorisations absolues pour scanner les dossiers, sous-dossiers et notifier l'utilisateur
        sed -i '/<\/manifest>/i \    <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE" \/>' $MANIFEST
        sed -i '/<\/manifest>/i \    <uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE" \/>' $MANIFEST
        sed -i '/<\/manifest>/i \    <uses-permission android:name="android.permission.MANAGE_EXTERNAL_STORAGE" \/>' $MANIFEST
        sed -i '/<\/manifest>/i \    <uses-permission android:name="android.permission.POST_NOTIFICATIONS" \/>' $MANIFEST

    - name: Activation du zoom (pincement) dans le WebView Android
      run: |
        # MainActivity.java par defaut ne configure pas le WebView pour
        # accepter le pincement de zoom. On regenere ce fichier avec les
        # bons reglages, a partir de l'appId declare dans capacitor.config.json.
        # (Ecrit via Node plutot qu'un heredoc bash, pour eviter les pieges
        # d'indentation dans un fichier YAML.)
        node -e "
        const fs = require('fs');
        const path = require('path');
        const appId = require('./capacitor.config.json').appId;
        const pkgPath = appId.split('.').join('/');
        const dir = path.join('android/app/src/main/java', pkgPath);
        fs.mkdirSync(dir, { recursive: true });
        const content = [
          'package ' + appId + ';',
          '',
          'import android.content.Intent;',
          'import android.net.Uri;',
          'import android.os.Build;',
          'import android.os.Bundle;',
          'import android.provider.Settings;',
          'import android.webkit.JavascriptInterface;',
          'import android.webkit.WebSettings;',
          'import com.getcapacitor.BridgeActivity;',
          '',
          'public class MainActivity extends BridgeActivity {',
          '    @Override',
          '    public void onCreate(Bundle savedInstanceState) {',
          '        super.onCreate(savedInstanceState);',
          '        WebSettings settings = this.bridge.getWebView().getSettings();',
          '        settings.setSupportZoom(true);',
          '        settings.setBuiltInZoomControls(true);',
          '        settings.setDisplayZoomControls(false);',
          '',
          '        this.bridge.getWebView().addJavascriptInterface(',
          '            new StoragePermissionBridge(this), \"StoragePermissionBridge\"',
          '        );',
          '    }',
          '',
          '    // Pont JS -> natif : ouvre directement l ecran Android qui permet',
          '    // d activer \"Acces a tous les fichiers\" (MANAGE_EXTERNAL_STORAGE),',
          '    // une permission speciale qu aucune boite de dialogue standard ne',
          '    // peut declencher depuis Android 11. Appele depuis index.html via',
          '    // window.StoragePermissionBridge.openManageAllFilesSettings().',
          '    public class StoragePermissionBridge {',
          '        private final MainActivity activity;',
          '',
          '        StoragePermissionBridge(MainActivity activity) {',
          '            this.activity = activity;',
          '        }',
          '',
          '        @JavascriptInterface',
          '        public void openManageAllFilesSettings() {',
          '            activity.runOnUiThread(new Runnable() {',
          '                @Override',
          '                public void run() {',
          '                    try {',
          '                        Intent intent;',
          '                        if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.R) {',
          '                            intent = new Intent(Settings.ACTION_MANAGE_APP_ALL_FILES_ACCESS_PERMISSION);',
          '                            intent.setData(Uri.parse(\"package:\" + activity.getPackageName()));',
          '                        } else {',
          '                            intent = new Intent(Settings.ACTION_APPLICATION_DETAILS_SETTINGS);',
          '                            intent.setData(Uri.parse(\"package:\" + activity.getPackageName()));',
          '                        }',
          '                        activity.startActivity(intent);',
          '                    } catch (Exception e) {',
          '                        Intent fallback = new Intent(Settings.ACTION_APPLICATION_DETAILS_SETTINGS);',
          '                        fallback.setData(Uri.parse(\"package:\" + activity.getPackageName()));',
          '                        activity.startActivity(fallback);',
          '                    }',
          '                }',
          '            });',
          '        }',
          '    }',
          '}',
          ''
        ].join('\n');
        fs.writeFileSync(path.join(dir, 'MainActivity.java'), content);
        console.log('MainActivity.java mis à jour (zoom + pont permission stockage) :', path.join(dir, 'MainActivity.java'));
        console.log(content);
        "

    - name: Synchronisation finale des scripts (libs) et du code web
      run: npx cap sync android

    - name: Autorisation d'exécution Gradle
      run: chmod +x android/gradlew

    - name: Compilation de l'APK Natif
      run: |
        cd android
        ./gradlew assembleDebug

    - name: Téléchargement de ton fichier APK
      uses: actions/upload-artifact@v4
      with:
        name: MonApp-Native-Complete
        path: android/app/build/outputs/apk/debug/app-debug.apk
